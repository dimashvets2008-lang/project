<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechZone — Регистрация</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="container header__row">
          <a class="brand" href="index.html"><img class="brand__logo" src="TechZone.png" alt="TechZone" /></a>
          <div></div>
          <div class="header__controls">
            <input class="nav__toggle" type="checkbox" id="nav-register" />
            <label class="nav__burger" for="nav-register" aria-label="Меню"><span></span><span></span><span></span></label>
            <nav class="nav">
              <a class="nav__link" href="index.html">Главная</a>
              <a class="nav__link" href="catalog.html">Каталог</a>
              <a class="nav__link" href="login.html">Вход</a>
              <a class="nav__btn" href="register.html">Регистрация</a>
              <a class="nav__link" href="profile.html">Кабинет</a>
            </nav>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="section">
          <div class="container">
            <h1 class="page-title">Регистрация</h1>
            <p class="page-subtitle">Все поля обязательны для заполнения.</p>
            <form class="panel form-grid form-grid--2" action="#" method="post">
              <label class="field"><span class="label">E-mail</span><input class="input" type="email" required /></label>
              <label class="field"><span class="label">Фамилия</span><input class="input" type="text" required /></label>
              <label class="field"><span class="label">Имя</span><input class="input" type="text" required /></label>
              <label class="field"><span class="label">Дата рождения</span><input class="input" type="date" required /></label>
              <label class="field"><span class="label">Номер телефона</span><input class="input" type="tel" required /></label>
              <label class="field"><span class="label">Пароль</span><input class="input" type="password" required /></label>
              <label class="field"><span class="label">Повтор пароля</span><input class="input" type="password" required /></label>
              <div class="actions" style="grid-column: 1 / -1">
                <button class="btn-main" type="submit">Зарегистрироваться</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
